<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel — Portfolio (DEMO)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="admin-demo.css" />
</head>

<body class="admin-body-bg">
    <div class="demo-banner">
        <span class="demo-badge">🎭 DEMO MODE</span>
        Changes save to your browser only — no real database connected.
        &nbsp;·&nbsp; Password: <code>asad@admin2026</code>
    </div>


    <div class="admin-overlay" id="loginOverlay" style="top:32px">
        <div class="login-card">
            <div class="lock-icon"><i class="fas fa-lock"></i></div>
            <h2>Admin Panel</h2>
            <p>Enter password to manage your portfolio</p>
            <div class="afg" style="text-align:left;margin-bottom:1rem">
                <label>Password</label>
                <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password" />
                <div class="login-err" id="loginErr">❌ Incorrect password.</div>
            </div>
            <button class="btn-p full" id="loginBtn"><i class="fas fa-unlock"></i> Login</button>
            <p class="pw-hint">Demo password: <code>asad@admin2026</code></p>
        </div>
    </div>

    <div style="display:none;padding-top:32px" id="adminPage">

        <nav class="admin-nav">
            <div class="anlogo">Asad<span>.</span> <small
                    style="font-size:.72rem;font-weight:400;color:var(--tx3)">Admin</small></div>
            <div style="display:flex;gap:.8rem;align-items:center">
                <a href="index.html" class="btn-o btn-sm" target="_blank"><i class="fas fa-eye"></i> View Site</a>
                <button class="btn-p btn-sm" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </nav>

        <div class="admin-body">
            <div class="admin-tabs">
                <button class="atab active" data-tab="hero">🏠 Hero</button>
                <button class="atab" data-tab="about">👤 About</button>
                <button class="atab" data-tab="skills">🧩 Skills</button>
                <button class="atab" data-tab="projects">🗂️ Projects</button>
                <button class="atab" data-tab="certs">🎓 Certs</button>
                <button class="atab" data-tab="contact">📬 Contact</button>
                <button class="atab" data-tab="footer">🦶 Footer</button>
            </div>

        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script src="admin-demo.js"></script>

</body>

</html>
